<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Матрица Чистоты</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 16px;
      margin: 0;
      background-color: #1c1c1e;
      color: #ffffff;
      display: flex;
      justify-content: center;
    }
    .container {
      width: 100%;
      max-width: 450px;
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #f1d154;
    }
    .slot-wrapper {
      position: relative;
      background-color: #101012;
      padding: 12px;
      border-radius: 12px;
      border: 3px solid #3a3a3c;
      overflow: hidden;
    }
    .slot-machine {
      display: grid;
      grid-template-columns: 1.2fr 1fr 0.9fr;
      gap: 8px;
      height: 140px;
    }
    .reel {
      background-color: #2c2c2e;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 8px;
      text-align: center;
      border: 1px solid #48484a;
      overflow: hidden;
    }
    .text-container {
      font-size: 14px;
      font-weight: 600;
      line-height: 1.3;
      word-break: break-word;
    }
    /* Анимации */
    .spinning {
      animation: infiniteScroll 0.2s infinite linear;
    }
    .blur-off {
      animation: blurFadeIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }
    @keyframes infiniteScroll {
      0% { transform: translateY(0); filter: blur(4px); }
      50% { transform: translateY(-10px); filter: blur(6px); }
      100% { transform: translateY(10px); filter: blur(4px); }
    }
    @keyframes blurFadeIn {
      0% { filter: blur(6px); transform: scale(0.95); opacity: 0.5; }
      100% { filter: blur(0px); transform: scale(1); opacity: 1; }
    }
    .visor-frame {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      box-shadow: inset 0 15px 15px rgba(0,0,0,0.5), inset 0 -15px 15px rgba(0,0,0,0.5);
      border-radius: 9px;
    }
    .controls {
      margin-top: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    button {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }
    .main-btn {
      background-color: #34c759;
      color: #fff;
      box-shadow: 0 4px 12px rgba(52, 199, 89, 0.3);
    }
    .action-block {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .go-btn {
      background-color: #f1d154;
      color: #000;
    }
    .reroll-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .reroll-btn {
      width: auto;
      padding: 10px 16px;
      background-color: #3a3a3c;
      color: #fff;
      font-size: 14px;
    }
    .counter {
      font-size: 13px;
      color: #aeaeaf;
    }
    .hidden { display: none !important; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>

<div class="container">
  <h2>Матрица Чистоты</h2>
  
  <div class="slot-wrapper">
    <div class="slot-machine">
      <div class="reel" id="reel-action"><div class="text-container" id="text-action">???</div></div>
      <div class="reel" id="reel-quantity"><div class="text-container" id="text-quantity">???</div></div>
      <div class="reel" id="reel-zone"><div class="text-container" id="text-zone">???</div></div>
    </div>
    <div class="visor-frame"></div>
  </div>

  <div class="controls">
    <button id="spin-btn" class="main-btn">Крутить рулетку</button>
    
    <div id="action-block" class="action-block hidden">
      <button id="go-btn" class="go-btn">Погнали! 🚀</button>
      <div class="reroll-row">
        <button id="reroll-btn" class="reroll-btn">Перекрутить 🔄</button>
        <span class="counter" id="attempts-counter">Осталось попыток: 3</span>
      </div>
    </div>
  </div>
</div>

<script>
  // Инициализация Telegram Web App
  const tg = window.Telegram?.WebApp;
  if (tg) tg.ready();

  let tasksData = [];
  let isSpinning = false;
  let hasSpun = false;
  let attemptsLeft = 3;

  // Элементы DOM
  const spinBtn = document.getElementById('spin-btn');
  const actionBlock = document.getElementById('action-block');
  const goBtn = document.getElementById('go-btn');
  const rerollBtn = document.getElementById('reroll-btn');
  const counterEl = document.getElementById('attempts-counter');

  const reels = [
    document.getElementById('reel-action'),
    document.getElementById('reel-quantity'),
    document.getElementById('reel-zone')
  ];
  const texts = {
    action: document.getElementById('text-action'),
    quantity: document.getElementById('text-quantity'),
    zone: document.getElementById('text-zone')
  };

  // Функция тактильной отдачи Telegram
  function triggerHaptic(type) {
    if (tg?.HapticFeedback) {
      if (type === 'light') tg.HapticFeedback.impactOccurred('light');
      if (type === 'medium') tg.HapticFeedback.impactOccurred('medium');
      if (type === 'success') tg.HapticFeedback.notificationOccurred('success');
      if (type === 'warning') tg.HapticFeedback.notificationOccurred('warning');
    }
  }

async function loadTasks() {
    try {
      const response = await fetch('/rouletteTasks.json');
      tasksData = await response.json();
      
      if (tasksData && tasksData.length > 0) {
        const randomZone = tasksData[Math.floor(Math.random() * tasksData.length)];
        const randomTask = randomZone.tasks[Math.floor(Math.random() * randomZone.tasks.length)];
        const randomQuantity = randomTask.quantity_options[Math.floor(Math.random() * randomTask.quantity_options.length)];
        
        texts.action.textContent = randomTask.action_with_object;
        texts.quantity.textContent = randomQuantity;
        texts.zone.textContent = randomZone.name;
      }
    } catch (e) {
      console.error("Не удалось прочитать rouletteTasks.json:", e);
      // Запасной рабочий вариант интерфейса, чтобы экран не был белым
      texts.action.textContent = "Ошибка";
      texts.quantity.textContent = "загрузки";
      texts.zone.textContent = "данных";
      tasksData = []; // Гарантируем, что переменная останется массивом
    }
}

function checkLimits() {
    const today = new Date().toISOString().split('T')[0];
    const savedDate = localStorage.getItem('slot_spin_date');
    const savedAttempts = localStorage.getItem('slot_spin_attempts');

    if (savedDate !== today) {
      localStorage.setItem('slot_spin_date', today);
      localStorage.setItem('slot_spin_attempts', '3');
      attemptsLeft = 3;
    } else if (savedAttempts !== null) {
      attemptsLeft = parseInt(savedAttempts, 10);
    }
    counterEl.textContent = `Осталось попыток: ${attemptsLeft}`;
  }

  loadTasks().then(checkLimits);

  function startSpin() {
    if (isSpinning) return;
    if (hasSpun && attemptsLeft <= 0) {
      triggerHaptic('warning');
      alert('У вас закончились попытки перекрутить на сегодня!');
      return;
    }

    isSpinning = true;
    spinBtn.textContent = 'Удача решает...';
    spinBtn.disabled = true;

    // Включаем анимацию кручения и размытия
    reels.forEach(reel => {
      reel.classList.remove('blur-off');
      reel.classList.add('spinning');
    });
    triggerHaptic('medium');

    // Рандомайзер
    const randomZone = tasksData[Math.floor(Math.random() * tasksData.length)];
    const randomTask = randomZone.tasks[Math.floor(Math.random() * randomZone.tasks.length)];
    const randomQuantity = randomTask.quantity_options[Math.floor(Math.random() * randomTask.quantity_options.length)];

    // Последовательная остановка
    const delays = [1200, 1700, 2200];
    delays.forEach((delay, index) => {
      setTimeout(() => {
        reels[index].classList.remove('spinning');
        reels[index].classList.add('blur-off');
        triggerHaptic('light');

        if (index === 0) texts.action.textContent = randomTask.action_with_object;
        if (index === 1) texts.quantity.textContent = randomQuantity;
        if (index === 2) texts.zone.textContent = randomZone.name;

        if (index === 2) {
          isSpinning = false;
          triggerHaptic('success');
          spinBtn.classList.add('hidden');
          actionBlock.classList.remove('hidden');

          if (hasSpun) {
            attemptsLeft = Math.max(0, attemptsLeft - 1);
            localStorage.setItem('slot_spin_attempts', attemptsLeft.toString());
            counterEl.textContent = `Осталось попыток: ${attemptsLeft}`;
          }
          hasSpun = true;
          if (attemptsLeft <= 0) rerollBtn.disabled = true;
        }
      }, delay);
    });
  }

  spinBtn.addEventListener('click', startSpin);
  rerollBtn.addEventListener('click', () => {
    actionBlock.classList.add('hidden');
    spinBtn.classList.remove('hidden');
    startSpin();
  });
  
  goBtn.addEventListener('click', () => {
    alert('Задание принято! Таймер пошел.');
    if (tg) tg.close(); 
  });

loadTasks().finally(() => {
  checkLimits();
});
</script>
</body>
</html>
