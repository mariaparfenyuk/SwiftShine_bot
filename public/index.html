<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Таймер FlyLady</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Telegram Web Apps SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- Canvas Confetti для дофаминового триггера -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/input.min.js"></script>
</head>
<body>
    <div id="app-container" class="app-container">
        <!-- Таймер -->
        <div class="timer-display" id="timer-display">15:00</div>
        
        <!-- Динамические мотиваторы -->
        <div class="motivator-container">
            <p id="motivator-text" class="motivator-text fade-in">Погнали! Ставь таймер и не думай о масштабах катастрофы.</p>
        </div>

        <!-- Кнопки управления -->
        <div class="controls">
            <button id="btn-start" class="btn btn-start">Старт</button>
            <button id="btn-pause" class="btn btn-pause hidden">Пауза</button>
            <button id="btn-reset" class="btn btn-reset">Сброс</button>
        </div>
    </div>

    <!-- Аудио-триггер финала -->
    <audio id="success-sound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg" preload="auto"></audio>

    <script src="timer.js"></script>
</body>
</html>
